name: Submit a Prompt
description: Propose a structured AI-assisted peer-review prompt.
title: "[Prompt] "
labels: ["submission", "prompt"]
body:
  - type: input
    id: title
    attributes:
      label: Prompt title
      description: A short, descriptive title.
    validations:
      required: true
  - type: dropdown
    id: role
    attributes:
      label: Intended user
      options:
        - 供作者使用 / For authors
        - 供审稿人使用 / For reviewers
    validations:
      required: true
  - type: dropdown
    id: task
    attributes:
      label: Task
      options:
        - 完整论文 / Full paper
        - Rebuttal
    validations:
      required: true
  - type: dropdown
    id: kind
    attributes:
      label: Format
      options:
        - 单条 Prompt / Single prompt
        - 多步工作流 / Multi-step workflow
    validations:
      required: true
  - type: textarea
    id: use_case
    attributes:
      label: Use case
      description: Explain when this prompt should be used and what decision it helps with.
    validations:
      required: true
  - type: textarea
    id: prompt
    attributes:
      label: Prompt text
      description: Include the full prompt and any placeholders.
      render: markdown
    validations:
      required: true
  - type: textarea
    id: metadata
    attributes:
      label: Input, output, limits, and source
      description: Describe expected input, output format, known limitations, license, source, and attribution.
    validations:
      required: true
